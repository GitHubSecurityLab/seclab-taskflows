seclab-taskflow-agent:
  filetype: toolbox
  version: "1.0"
server_params:
  kind: stdio
  command: python
  args: ["-m", "seclab_taskflows.mcp_servers.fuzz_context"]
  env:
    FUZZ_CONTEXT_DIR: "{{ env('DATA_DIR', required=False) }}"
    LOG_DIR: "{{ env('LOG_DIR', required=False) }}"
