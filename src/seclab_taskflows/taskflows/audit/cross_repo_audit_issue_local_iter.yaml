seclab-taskflow-agent:
  filetype: taskflow
  version: "1.0"
model_config: seclab_taskflows.configs.model_config

globals: {}
# Taskflow to audit potential issues across all repos in the workspace.
taskflow:
  - task:
      must_complete: true
      exclude_from_context: true
      agents:
        - seclab_taskflow_agent.personalities.assistant
      model: general_tasks
      user_prompt: |
        Fetch all component issues across all repositories in this workspace.
      toolboxes:
        - seclab_taskflows.toolboxes.repo_context
  - task:
      must_complete: false
      max_steps: 100
      repeat_prompt: true
      async: false
      agents:
        - seclab_taskflows.personalities.web_application_security_expert
      model: code_analysis
      user_prompt: |
        You are auditing a multi-repo workspace. The repositories in this workspace may form
        a system of related services (e.g. microservices). When auditing an issue, consider
        cross-repo data flows: a vulnerability in one service may be exploitable via another
        service's entry point, or trust relationships between services may affect exploitability.
        You have access to the source code of all repos in the workspace via local_file_viewer.

        The issue is in repo {{ result.repo }} with id {{ result.issue_id }}.
        The component is under the directory {{ result.location }} with component_id {{ result.component_id }}.
        The notes of the component is:

        {{ result.component_notes }}

        The type of the issue is {{ result.issue_type }} and here is the notes of the issue:

        {{ result.issue_notes }}

        {% include 'seclab_taskflows.prompts.audit.audit_issue' %}
      toolboxes:
        - seclab_taskflows.toolboxes.repo_context
        - seclab_taskflows.toolboxes.local_file_viewer
