seclab-taskflow-agent:
  filetype: taskflow
  version: "1.0"
model_config: seclab_taskflows.configs.model_config

globals:
  repo:
  iteration:
  time_budget_seconds:

# One iteration of the fuzz / coverage / improve loop, applied to every
# harness whose build_status is "ok". Invoked once per budget by
# scripts/fuzzing/run_fuzzing.sh.
taskflow:
  - task:
      must_complete: true
      exclude_from_context: true
      model: general_tasks
      agents:
        - seclab_taskflow_agent.personalities.assistant
      user_prompt: |
        List harnesses for {{ globals.repo }} via `get_harnesses`. Filter to
        rows whose `build_status == "ok"` and pass them through.
      toolboxes:
        - seclab_taskflows.toolboxes.fuzz_context

  - task:
      model: code_analysis
      must_complete: false
      repeat_prompt: true
      async: true
      max_steps: 150
      name: fuzz iteration
      description: Run AFL++ for the assigned budget, collect coverage, then improve harness/seeds.
      agents:
        - seclab_taskflows.personalities.fuzzing_engineer
      user_prompt: |
        Run iteration {{ globals.iteration }} of the fuzz/coverage/improve loop
        for harness id {{ result.id }} (target {{ result.target_id }}) in
        {{ globals.repo }}, with a wall-clock budget of
        {{ globals.time_budget_seconds }} seconds.

        ## MUST-DO (do these first, in order, before any analysis)

          1. `start_fuzz_run(harness_id={{ result.id }},
                              iteration_number={{ globals.iteration }},
                              time_budget_seconds={{ globals.time_budget_seconds }},
                              output_dir=<choose under workspace runs_dir>)`
             → returns a `run_id`.

          2. `run_afl_for(afl_binary_path={{ result.afl_binary_path }},
                           seed_dir=get_persistent_corpus_dir(harness_id={{ result.id }})['corpus_dir'],
                           output_dir=<run output dir>,
                           seconds={{ globals.time_budget_seconds }},
                           memory_limit_mb=1024,
                           timeout_ms=2000,
                           parallel_workers=1,
                           dictionary=<seeds dir>/auto.dict if it exists)`.

             Using the persistent corpus dir (rather than the original seeds
             dir) means yesterday's queue carries over to today's run. The
             dictionary path is also persistent — you do NOT need to
             regenerate it every iteration.

             You may set `parallel_workers=2` (or up to `nproc - 1`) when the
             host has spare cores AND the target is single-threaded. For
             multi-threaded targets, leave at 1. For very tight loops where
             we expect ReDoS / pathological algorithmic blow-up (e.g. regex
             engines), drop `timeout_ms` to 500-1000.

          3. `finish_fuzz_run(run_id, exec_per_sec, paths_total, crashes_count,
                               hangs_count, status)` — **always** call this even
             if step 2 returned `ok: false`. Use status="failed" in that case.

          4. `run_coverage(cov_binary_path={{ result.cov_binary_path }},
                            inputs_dir=<run output dir>/default/queue,
                            output_dir=<run output dir>/coverage)`.

          5. `store_coverage_from_lcov(run_id, lcov_path, html_path=<from step 4>)`
             — pass the html_path returned by `run_coverage` so the dashboard
             can link to the annotated HTML coverage report.

          6. `fold_queue_into_persistent_corpus(
                  afl_binary_path={{ result.afl_binary_path }},
                  queue_dir=<run output dir>/default/queue,
                  persistent_corpus_dir=<the corpus dir from step 2>)`.
             This merges any new inputs AFL discovered into the persistent
             corpus and minimises in place — so the next iteration starts
             from a deduped union of everything ever found.

        These six steps are mandatory bookkeeping. Do them all before doing any
        coverage-feedback analysis. Each step is a single tool call.

        ## OPTIONAL (do as many as `max_steps` allows)

        After bookkeeping, use `get_coverage_summary` and `get_coverage_gaps`
        to read coverage state, then decide what (if anything) to improve
        before the next iteration.

        At the END of the iteration (after any improvements), call
        `store_iteration_note(repo={{ globals.repo }},
                                iteration_number={{ globals.iteration }},
                                harness_id={{ result.id }},
                                note="<one-line summary of what changed>")`.
        Examples of good notes:
          - "added 3 seeds satisfying CRC32 guard at parser.c:142"
          - "rebuilt harness v2; +12% line coverage in lzma2_decoder"
          - "no actionable gaps; AFL is exploring deeply (350 paths)"
          - "plateau — same coverage as iter N-1; expect early stop"

        {% include 'seclab_taskflows.prompts.fuzzing.coverage_feedback' %}

      toolboxes:
        - seclab_taskflows.toolboxes.fuzz_context
        - seclab_taskflows.toolboxes.fuzz_runner
        - seclab_taskflows.toolboxes.local_shell
        - seclab_taskflows.toolboxes.local_file_viewer
