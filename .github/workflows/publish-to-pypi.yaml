name: Publish to PyPI

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest


    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.14"

    - name: Install Hatch
      run: pip install --upgrade hatch

    - name: Build the wheel
      run: python3 -m hatch build

    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: python-package-distributions
        path: ./dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # This environment is required as an input to pypa/gh-action-pypi-publish
    environment:
      name: pypi
      url: https://pypi.org/p/seclab-taskflows

    env:
      GITHUB_REPO: ${{ github.repository }}

    permissions:
      contents: write
      id-token: write  # For trusted publishing
      attestations: write  # For artifact attestation

    steps:
    - name: Download distribution artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: ./dist/

    - name: Attest build provenance
      uses: actions/attest@v4.1.0 # immutable release
      with:
        subject-path: ./dist/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        verbose: true

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_NAME: ${{ github.ref_name }}
      run: gh release create $RELEASE_NAME dist/* --repo $GITHUB_REPO --generate-notes
